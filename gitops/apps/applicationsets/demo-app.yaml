apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: demo-app
  namespace: argocd
spec:
  goTemplate: true # ← เปิด Go template engine
  goTemplateOptions:
    - missingkey=error

  generators:
    - list:
        elements:
          - env: dev
            namespace: demo-dev
            autoSync: true # ← boolean จริงๆ
          - env: staging
            namespace: demo-staging
            autoSync: true
          - env: prod
            namespace: demo-prod
            autoSync: false

  template:
    metadata:
      name: "demo-app-{{.env}}" # ← Go template ใช้ {{.field}}
    spec:
      project: lab
      source:
        repoURL: https://github.com/t10ez/gitops-lab
        targetRevision: main
        path: gitops/charts/demo-app
        helm:
          valueFiles:
            - values.yaml
            - "../../environments/{{.env}}/values.yaml"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.namespace}}"
      syncPolicy:
        automated:
          prune: { { .autoSync } } # ← boolean ถูกต้อง
          selfHeal: { { .autoSync } }
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 3
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 1m
