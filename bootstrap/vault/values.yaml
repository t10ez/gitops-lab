global:
  tlsDisable: false

server:
  ha:
    enabled: true
    replicas: 3
    raft:
      enabled: true
      setNodeId: true
      config: |
        ui = true

        listener "tcp" {
          tls_disable        = 0
          address            = "[::]:8200"
          cluster_address    = "[::]:8201"
          tls_cert_file      = "/vault/userconfig/vault-tls/tls.crt"
          tls_key_file       = "/vault/userconfig/vault-tls/tls.key"
          tls_client_ca_file = "/vault/userconfig/vault-tls/ca.crt"
        }

        storage "raft" {
          path = "/vault/data"
        }

        service_registration "kubernetes" {}

  volumes:
    - name: vault-tls
      secret:
        secretName: vault-tls

  volumeMounts:
    - name: vault-tls
      mountPath: /vault/userconfig/vault-tls
      readOnly: true

  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi

  dataStorage:
    enabled: true
    size: 10Gi
    storageClass: standard

  ingress:
    enabled: false

ui:
  enabled: true

injector:
  enabled: false
