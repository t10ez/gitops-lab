apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: vault-tls
  namespace: vault
spec:
  secretName: vault-tls
  issuerRef:
    name: lab-ca-issuer
    kind: ClusterIssuer
  duration: 8760h    # 1 year
  renewBefore: 720h  # 30 days
  dnsNames:
    # Regular service (used by clients and UI)
    - vault
    - vault.vault
    - vault.vault.svc
    - vault.vault.svc.cluster.local
    # Headless service (used internally by Raft for peer-to-peer)
    - vault-internal
    - vault-internal.vault.svc.cluster.local
    # Per-pod headless DNS — wildcard covers any replica count
    # (vault-0, vault-1, vault-2, vault-3, ... ไม่ต้องแก้เมื่อ scale)
    - "*.vault-internal"
    - "*.vault-internal.vault.svc.cluster.local"
    # For local port-forward access
    - localhost
  ipAddresses:
    - 127.0.0.1
