apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: vault-tls-skip
  namespace: vault
spec:
  insecureSkipVerify: true
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: vault
  namespace: vault
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`vault.localhost`)
      priority: 10
      services:
        - name: vault
          port: 8200
          scheme: https
          serversTransport: vault-tls-skip
