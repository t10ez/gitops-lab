# ClusterSecretStore — "สะพาน" ระหว่าง ESO กับ Vault
#
# Resource นี้ทำหน้าที่บอก ESO ว่า:
#   - Vault อยู่ที่ไหน
#   - ใช้ auth method อะไร
#   - login ด้วย ServiceAccount ชื่ออะไร / role ชื่ออะไร
#
# ExternalSecret ทุกตัว (ใน namespace ไหนก็ได้) จะ reference
# ชื่อ "vault-backend" นี้ผ่าน spec.secretStoreRef.name
# ─────────────────────────────────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
  # ClusterSecretStore ไม่มี namespace — ใช้ได้ทุก namespace ในคลัสเตอร์
spec:
  provider:
    vault:
      # ──────────────────────────────────────────────────────────
      # Vault server address (ใช้ในคลัสเตอร์ → in-cluster DNS)
      # ถ้าเปลี่ยน service name หรือ port ต้องแก้ตรงนี้
      # ──────────────────────────────────────────────────────────
      server: "https://vault.vault.svc.cluster.local:8200"

      # Secret engine path — ต้องตรงกับที่รัน:
      #   vault secrets enable -path=secret kv-v2
      # ใน setup-vault.sh
      path: "secret"

      # KV version — ต้องตรงกับที่ enable ไว้ (kv-v2 → Version: "2")
      version: "v2"

      # ──────────────────────────────────────────────────────────
      # TLS: ใช้ CA cert จาก cert-manager (secret ชื่อ vault-tls)
      # ถ้า CA เปลี่ยน ต้อง update secret นี้ด้วย
      # ──────────────────────────────────────────────────────────
      caProvider:
        type: Secret
        name: vault-tls       # secret ที่ cert-manager สร้างไว้
        key: ca.crt
        namespace: vault

      # ──────────────────────────────────────────────────────────
      # Authentication: ใช้ Kubernetes auth method
      #
      # Flow:
      #   1. ESO ใช้ ServiceAccount "external-secrets" ส่ง JWT → Vault
      #   2. Vault verify JWT กับ Kubernetes TokenReview API
      #   3. Vault ออก token ตาม eso-policy (read-only)
      #
      # ❗ role ต้องตรงกับที่สร้างใน setup-vault.sh:
      #      vault write auth/kubernetes/role/eso-role ...
      # ──────────────────────────────────────────────────────────
      auth:
        kubernetes:
          mountPath: "kubernetes"   # auth method path ใน Vault
          role: "eso-role"          # ❗ ต้องตรงกับ setup-vault.sh

          # ServiceAccount ที่ ESO ใช้ส่ง token
          # ❗ ต้องตรงกับ bound_service_account_names ใน setup-vault.sh
          serviceAccountRef:
            name: "external-secrets"
            namespace: "external-secrets"
