# ExternalSecret — ดึง secret จาก Vault มาสร้างเป็น Kubernetes Secret
#
# ไฟล์นี้คือ template สำหรับ namespace demo-dev
# copy ไปแก้ env และ namespace สำหรับ staging/prod
#
# ─── Connection ────────────────────────────────────────────────
#
#  ExternalSecret นี้
#    │
#    ├─ secretStoreRef → ClusterSecretStore "vault-backend"
#    │    └─ bootstrap/eso/cluster-secret-store.yaml
#    │
#    └─ remoteRef.key = "demo-app/dev"
#         └─ จริงๆ คือ Vault path: secret/data/demo-app/dev
#            (ESO เติม "data/" ให้อัตโนมัติสำหรับ KV-v2)
#
# ─── Output ─────────────────────────────────────────────────────
#
#  ESO จะสร้าง Secret ชื่อ "demo-app-secret" ใน namespace เดียวกัน
#  Pod ใช้ envFrom หรือ env[].valueFrom.secretKeyRef ได้เลย
#
# ───────────────────────────────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: demo-app-secret
  namespace: demo-dev   # ❗ ต้องอยู่ namespace เดียวกับ app
spec:
  # ──────────────────────────────────────────────────────────────
  # ESO sync ทุกกี่นาที/ชั่วโมง
  # ลด interval ถ้าต้องการ secret update เร็วขึ้น
  # (trade-off: Vault API call ถี่ขึ้น)
  # ──────────────────────────────────────────────────────────────
  refreshInterval: 1h

  # ชี้ไปหา ClusterSecretStore ที่สร้างไว้
  # kind: ClusterSecretStore = ใช้ได้ข้าม namespace
  # kind: SecretStore        = ใช้ได้แค่ namespace เดียวกัน
  secretStoreRef:
    name: vault-backend       # ❗ ต้องตรงกับ metadata.name ใน cluster-secret-store.yaml
    kind: ClusterSecretStore

  # Kubernetes Secret ที่ ESO จะสร้าง / อัปเดต
  target:
    name: demo-app-secret     # ชื่อ Secret ที่ Pod จะ mount
    creationPolicy: Owner     # ESO เป็น owner → ลบ ExternalSecret = ลบ Secret ด้วย

  # ──────────────────────────────────────────────────────────────
  # Map Vault fields → Kubernetes Secret keys
  #
  # remoteRef.key      = Vault path หลัง engine path
  #                      (ไม่ต้องใส่ "data/" — ESO จัดการให้)
  # remoteRef.property = field name ใน Vault secret
  # secretKey          = key ใน Kubernetes Secret
  #
  # ❗ key ต้องตรงกับ path ที่ vault kv put ใน setup-vault.sh
  # ──────────────────────────────────────────────────────────────
  data:
    - secretKey: DATABASE_URL         # key ใน k8s Secret
      remoteRef:
        key: demo-app/dev             # Vault path (= secret/data/demo-app/dev)
        property: DATABASE_URL        # field ใน Vault KV

    - secretKey: API_KEY
      remoteRef:
        key: demo-app/dev
        property: API_KEY

  # ── หรือจะดึงทั้ง path มาเลย (dataFrom) ────────────────────
  # dataFrom:
  #   - extract:
  #       key: demo-app/dev   # ดึงทุก field มาเป็น key ใน Secret
  # ─────────────────────────────────────────────────────────────

---
# ตัวอย่าง Pod ที่ใช้ Secret นี้
# (ไม่ต้อง deploy จริง — เอาไว้อ้างอิง)
#
# apiVersion: v1
# kind: Pod
# spec:
#   containers:
#     - name: app
#       envFrom:
#         - secretRef:
#             name: demo-app-secret   # ← ชื่อเดียวกับ target.name ด้านบน
