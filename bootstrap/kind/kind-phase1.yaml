kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: platform-lab
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 30080
        hostPort: 8080
        protocol: TCP
      - containerPort: 30443
        hostPort: 8443
        protocol: TCP
      - containerPort: 30900
        hostPort: 9000
        protocol: TCP
  - role: worker
    labels:
      node-type: workload
      zone: a
  - role: worker
    labels:
      node-type: workload
      zone: b
  - role: worker
    labels:
      node-type: platform
      zone: c
